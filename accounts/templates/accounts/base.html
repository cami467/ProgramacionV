<!-- accounts/templates/accounts/base.html -->
<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Sistema de Usuarios</title>
    <!-- Bootstrap CSS —  Bootstrap para estilizar -->
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
</head>

<body>
    <!-- Barra de navegacion -->
    <nav class='navbar navbar-dark bg-dark'>
        <div class='container'>
            <span class='navbar-brand'>Sistema Usuarios</span>
            <div>
                {% if user.is_authenticated %}
                <!-- user.is_authenticated para mostrar/ocultar -->
                <span class='text-light me-3'>{{ user.nombre }}</span>
                {% if perms.accounts.delete_ciudad %}
                <a href='{% url "delete_ciudad" %}' class='btn btn-outline-danger btn-sm me-2'>
                    Eliminar Ciudad
                </a>
                {% endif %}
                <a href='{% url "logout" %}' class='btn btn-outline-light btn-sm'>
                    Cerrar sesion
                </a>
                {% else %}
                <a href='{% url "login" %}' class='btn btn-outline-light btn-sm me-2'>
                    Login
                </a>
                <a href='{% url "register" %}' class='btn btn-light btn-sm'>
                    Registrarse
                </a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class='container mt-5'>
        {% block content %}{% endblock %}
    </main>
</body>

</html>
