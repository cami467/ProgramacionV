<!-- accounts/templates/accounts/register.html -->
{% extends 'accounts/base.html' %}
{% block content %}
<div class='row justify-content-center'>
    <div class='col-md-6'>
        <div class='card shadow'>
            <div class='card-body'>
                <h2 class='text-center mb-4'>Crear cuenta</h2>
                <!-- Mostrar errores si existen -->
                {% if form.errors %}
                <div class='alert alert-danger'>
                    {{ form.non_field_errors }}
                </div>
                {% endif %}
                <!-- El token CSRF protege el formulario contra ataques externos.
                Django genera un valor único y lo guarda en una cookie.
                Al enviar un POST, este valor debe coincidir para confirmar
                que la petición viene de tu propia aplicación y no de un sitio malicioso. -->

                <form method='POST'>
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class='d-grid mt-3'>
                        <button type='submit' class='btn btn-primary'>
                            Registrarse
                        </button>
                    </div>
                </form>
                <p class='text-center mt-3'>
                    Ya tienes cuenta?
                    <a href='{% url "login" %}'>Inicia sesion</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
