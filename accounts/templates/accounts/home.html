<!-- accounts/templates/accounts/home.html -->
{% extends 'accounts/base.html' %}
{% block content %}
<div class='text-center mt-5'>
    <h1>Bienvenido, {{ usuario.nombre }}!</h1>
    <p class='lead'>Correo: {{ usuario.correo }}</p>
    <p>Ciudad: {{ usuario.ciudad }}</p>
    <a href='{% url "logout" %}' class='btn btn-danger mt-3'>
        Cerrar sesion
    </a>
</div>
{% endblock %}
